<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід в систему | Me and Only Me</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-bottom: 24px;
            color: #333333;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666666;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: #4a90e2;
        }
        .remember-me-container {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            cursor: pointer;
        }
        .remember-me-container input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .remember-me-container label {
            color: #555555;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Вхід до кабінету</h2>
    <form id="loginForm">
        <div class="input-group">
            <label for="email">Електронна пошта</label>
            <input type="email" id="email" required placeholder="example@mail.com">
        </div>
        <div class="input-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        
        <!-- Нова опція: Запам'ятати мене -->
        <div class="remember-me-container">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Запам'ятати мене</label>
        </div>
        
        <button type="submit" id="loginButton">Увійти</button>
    </form>
</div>

<!-- Підключення Firebase та логіки (потребує вашої конфігурації у firebase-config.js) -->
<script type="module" src="app.js"></script>
</body>
</html>
